<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optima bank - Login</title>
    <!-- Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="images/optima_logo.svg" alt="Optima bank" class="logo">
        </div>
    </header>

    <main class="content-wrapper">
        <div class="card left-card">
            <img src="images/left_screen_ebanking.png" alt="e-banking login">
        </div>

        <div class="card right-card">
            <img src="images/right_screen_trader.png" alt="trader login">
        </div>
    </main>

</body>

</html>
