<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Καλωσορίσατε στην Optima bank. Συνδεθείτε με ασφάλεια στο e-banking ή στην πλατφόρμα Optima trader. Η επίσημη εναλλακτική σελίδα πρόσβασης στις υπηρεσίες μας.">
    <meta name="robots" content="index, follow">
    <!-- Ensure search engines index but don't panic if it replaces main site -->
    <meta name="theme-color" content="#2A093D"> <!-- Matches primary purple for mobile browsers -->
    <link rel="canonical" href="https://www.optimabank.gr/">

    <!-- Open Graph (Facebook, LinkedIn, iMessage, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Optima Bank - Αρχική">
    <meta property="og:description"
        content="Καλωσορίσατε στην Optima bank. Συνδεθείτε με ασφάλεια στο e-banking ή στην πλατφόρμα Optima trader.">
    <meta property="og:url" content="https://www.optimabank.gr/">
    <meta property="og:image" content="https://www.optimabank.gr/media/tyya5n45/optima-orange.svg">
    <!-- Safe default logo -->

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Optima Bank - Αρχική">
    <meta name="twitter:description"
        content="Καλωσορίσατε στην Optima bank. Συνδεθείτε με ασφάλεια στο e-banking ή στην πλατφόρμα Optima trader.">
    <meta name="twitter:image" content="https://www.optimabank.gr/media/tyya5n45/optima-orange.svg">

    <title>Optima Bank - Αρχική</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <link rel="shortcut icon" href="images/favicon.png">

    <!-- Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo-container">
            <img src="images/optima_logo.svg" alt="Optima bank" class="logo">
        </div>
    </header>

    <main class="content-wrapper">
        <div class="content-left">
            <h1 class="main-title">Η σελίδα μας προσωρινά<br>δεν είναι διαθέσιμη.</h1>
            <p class="sub-description">
                <strong>Optima e-banking</strong> και <strong>Optima bank trader</strong> λειτουργούν<br>
                κανονικά και είναι στη διάθεσή σας.
            </p>
            <div class="button-group">
                <a href="https://ebanking.optimabank.gr/netteller/" target="_blank" class="btn btn-primary">
                    Optima e-banking
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon-arrow">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </a>
                <a href="https://trader.optimabank.gr/" target="_blank" class="btn btn-secondary">
                    Optima bank trader
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="icon-arrow">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </a>
            </div>
        </div>

        <div class="content-right">
            <img src="images/3d0image-dec.png" alt="Optima bank devices" class="devices-img">
        </div>
    </main>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Set initial state to avoid flash of unstyled content
            gsap.set([".main-header", ".logo", ".main-title", ".sub-description", ".btn", ".devices-img"], { autoAlpha: 0 });
            gsap.set(".main-header", { autoAlpha: 1 }); // Header background is visible, we'll slide it

            const tl = gsap.timeline({ defaults: { ease: "power4.out" } });

            // 1. Header bar slides down
            tl.from(".main-header", {
                yPercent: -100,
                duration: 1.0,
                ease: "expo.out"
            })
                // 2. Logo fades and scales in
                .fromTo(".logo",
                    { opacity: 0, scale: 0.8, y: 15 },
                    { opacity: 1, scale: 1, y: 0, duration: 1.0, autoAlpha: 1, ease: "back.out(1.5)" },
                    "-=0.6"
                )
                // 3. Left content text
                .fromTo(".main-title",
                    { opacity: 0, y: 30 },
                    { opacity: 1, y: 0, duration: 1.0, autoAlpha: 1 },
                    "-=0.4"
                )
                .fromTo(".sub-description",
                    { opacity: 0, y: 20 },
                    { opacity: 1, y: 0, duration: 1.0, autoAlpha: 1 },
                    "-=0.8"
                )
                .fromTo(".btn",
                    { opacity: 0, y: 20 },
                    { opacity: 1, y: 0, duration: 0.8, autoAlpha: 1, stagger: 0.15 },
                    "-=0.8"
                )
                // 4. Right image
                .fromTo(".devices-img",
                    { opacity: 0, x: 50, scale: 0.95 },
                    { opacity: 1, x: 0, scale: 1, duration: 1.5, autoAlpha: 1, ease: "expo.out" },
                    "-=1.2"
                );
        });
    </script>
</body>

</html>
